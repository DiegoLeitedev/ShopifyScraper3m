<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
    border-bottom: 1px solid #2d3748;
    padding: 18px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: #fff; flex: 1; }
  header h1 span { color: #48bb78; }

  .stat-bar {
    display: flex; gap: 0;
    border-bottom: 1px solid #1a2030;
    background: #12161f;
  }
  .stat { padding: 12px 24px; border-right: 1px solid #1a2030; text-align: center; min-width: 100px; }
  .stat .num { font-size: 24px; font-weight: 700; color: #48bb78; }
  .stat .lbl { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  .stat.wpp .num { color: #25D366; }
  .stat.email-s .num { color: #fc8181; }
  .stat.cnpj-s .num { color: #f6e05e; }

  .toolbar {
    padding: 12px 28px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid #1a2030;
  }
  input[type=text] {
    background: #1a2030; border: 1px solid #2d3748; color: #e2e8f0;
    padding: 7px 13px; border-radius: 7px; font-size: 13px; width: 260px; outline: none;
  }
  input[type=text]:focus { border-color: #48bb78; }
  select {
    background: #1a2030; border: 1px solid #2d3748; color: #e2e8f0;
    padding: 7px 13px; border-radius: 7px; font-size: 13px; outline: none; cursor: pointer;
  }
  .btn {
    padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-green { background: #25D366; color: #fff; }
  .btn-blue  { background: #3182ce; color: #fff; }
  .btn-gray  { background: #2d3748; color: #a0aec0; }

  .table-wrap { overflow-x: auto; padding: 0 28px 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th {
    background: #1a2030; color: #a0aec0; text-transform: uppercase;
    font-size: 10.5px; letter-spacing: .5px; padding: 9px 12px;
    text-align: left; position: sticky; top: 0; z-index: 1;
    border-bottom: 1px solid #2d3748; white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: #48bb78; }
  thead th.sorted { color: #48bb78; }
  tbody tr { border-bottom: 1px solid #181e2a; transition: background .1s; }
  tbody tr:hover { background: #1a2030; }
  td { padding: 9px 12px; vertical-align: middle; }

  /* Células especiais */
  td.domain a { color: #63b3ed; text-decoration: none; font-weight: 600; }
  td.domain a:hover { text-decoration: underline; }
  td.wpp-cell a {
    display: inline-flex; align-items: center; gap: 5px;
    background: #145c32; color: #25D366; padding: 4px 10px;
    border-radius: 5px; text-decoration: none; font-weight: 600; font-size: 12px;
    white-space: nowrap;

  td.email-cell a { color: #fc8181; text-decoration: none; }

<header>
  <h1>E-commerce Lead Scraper <span>BR</span></h1>
  <label class="btn btn-gray" style="font-size:12px">
    📂 Carregar CSV
    <input type="file" id="fileInput" accept=".csv" style="display:none">

<div class="stat-bar">

  <div class="stat"><div class="num" id="sPlat" style="font-size:13px;padding-top:4px">—</div><div class="lbl">Plataformas</div></div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Filtrar por domínio, nome, CNPJ...">
  <select id="filterPlat">
    <option value="">Todas as plataformas</option>
    <option value="shopify">Shopify</option>
    <option value="nuvemshop">Nuvemshop</option>
    <option value="tray">Tray</option>
    <option value="lojaintegrada">Loja Integrada</option>
    <option value="vtex">VTEX</option>
    <option value="woocommerce">WooCommerce</option>
  </select>
  <select id="filterContact">
    <option value="">Todos os contatos</option>
    <option value="whatsapp">Tem WhatsApp</option>
    <option value="email">Tem E-mail</option>
    <option value="cnpj">Tem CNPJ</option>
  </select>
</div>

<div id="uploadPrompt" class="upload-area" onclick="document.getElementById('fileInput').click()">
  <div style="font-size:44px">🛍️</div>
  <strong style="color:#a0aec0">Clique ou arraste um CSV aqui</strong>
  <p>Gerado pelo E-commerce Lead Scraper</p>
</div>

<div class="table-wrap" id="tableWrap" style="display:none">
  <table id="dataTable">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const COLS = [
  { key: 'dominio',     label: 'Domínio',     render: v => `<td class="domain"><a href="https://${v}" target="_blank">${v}</a></td>` },
  { key: 'plataforma',  label: 'Plataforma',  render: v => `<td><span class="plat plat-${(v||'outro').toLowerCase()}">${v||'—'}</span></td>` },
  { key: 'nome_loja',   label: 'Nome',        render: v => `<td>${v||'<span class="empty">—</span>'}</td>` },
  { key: 'whatsapp',    label: 'WhatsApp',    render: v => v
      ? `<td class="wpp-cell"><a href="https://wa.me/55${v.replace(/\D/g,'')}" target="_blank">💬 ${v}</a></td>`
      : '<td class="empty">—</td>' },
  { key: 'telefone',    label: 'Telefone',    render: v => `<td style="color:#68d391;white-space:nowrap">${v||'<span class="empty">—</span>'}</td>` },
  { key: 'email',       label: 'E-mail',      render: v => v
      ? `<td class="email-cell"><a href="mailto:${v}">${v}</a></td>`
      : '<td class="empty">—</td>' },
  { key: 'instagram',   label: 'Instagram',   render: v => v
      ? `<td class="instagram-cell"><a href="https://instagram.com/${v.replace('@','')}" target="_blank" style="color:inherit;text-decoration:none">${v}</a></td>`
      : '<td class="empty">—</td>' },
  { key: 'cnpj',        label: 'CNPJ',        render: v => `<td class="cnpj-cell">${v||'<span class="empty">—</span>'}</td>` },
  { key: 'razao_social',label: 'Razão Social',render: v => `<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${v||''}">${v||'<span class="empty">—</span>'}</td>` },
  { key: 'cidade',      label: 'Cidade',      render: v => `<td>${v||'<span class="empty">—</span>'}</td>` },
  { key: 'estado',      label: 'UF',          render: v => `<td>${v||'<span class="empty">—</span>'}</td>` },
  { key: 'produtos_count', label: 'Produtos', render: v => `<td style="text-align:right;color:#a0aec0">${v||'—'}</td>` },
  { key: 'status',      label: 'Status',      render: v => `<td><span style="background:${v==='ativo'?'#1a3826':'#3d1a1a'};color:${v==='ativo'?'#48bb78':'#fc8181'};padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${v||'—'}</span></td>` },
];

let allRows = [], sortCol = null, sortDir = 1, filteredRows = [];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += ch;
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').trim());
    return obj;
  });
}

function buildHeader() {
  const tr = document.createElement('tr');
  COLS.forEach(({key, label}) => {
    const th = document.createElement('th');
    th.innerHTML = label + (sortCol === key ? (sortDir > 0 ? ' ▲' : ' ▼') : '');
    if (sortCol === key) th.classList.add('sorted');
    th.addEventListener('click', () => {
      if (sortCol === key) sortDir *= -1; else { sortCol = key; sortDir = 1; }
      render();
    });
    tr.appendChild(th);
  });
  document.getElementById('thead').innerHTML = '';
  document.getElementById('thead').appendChild(tr);
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const platFilter = document.getElementById('filterPlat').value.toLowerCase();
  const contactFilter = document.getElementById('filterContact').value;

  let rows = allRows;
  if (q) rows = rows.filter(r => Object.values(r).some(v => v.toLowerCase().includes(q)));
  if (platFilter) rows = rows.filter(r => (r.plataforma||'').toLowerCase() === platFilter);
  if (contactFilter === 'whatsapp') rows = rows.filter(r => r.whatsapp);
  if (contactFilter === 'email')    rows = rows.filter(r => r.email);
  if (contactFilter === 'cnpj')     rows = rows.filter(r => r.cnpj);

  if (sortCol) {
    rows = [...rows].sort((a, b) =>
      (a[sortCol]||'').localeCompare(b[sortCol]||'', 'pt', {numeric:true}) * sortDir
    );
  }

  filteredRows = rows;
  buildHeader();

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="20" class="empty-state">Nenhuma loja encontrada</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r =>
    '<tr>' + COLS.map(({key, render}) => render(r[key]||'')).join('') + '</tr>'
  ).join('');

  // Stats
  document.getElementById('sTotal').textContent  = allRows.length;
  document.getElementById('sWpp').textContent    = allRows.filter(r => r.whatsapp).length;
  document.getElementById('sEmail').textContent  = allRows.filter(r => r.email).length;
  document.getElementById('sCnpj').textContent   = allRows.filter(r => r.cnpj).length;
  const plats = [...new Set(allRows.map(r => r.plataforma).filter(Boolean))];
  document.getElementById('sPlat').textContent   = plats.join(' · ') || '—';
}

function loadCSV(text) {
  allRows = parseCSV(text);
  document.getElementById('uploadPrompt').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';
  render();
}

function exportFiltered() {
  if (!filteredRows.length) return;
  const headers = COLS.map(c => c.key);
  const lines = [headers.join(',')];
  filteredRows.forEach(r => {
    lines.push(headers.map(h => `"${(r[h]||'').replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob(['\uFEFF' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  new FileReader().onload = ev => loadCSV(ev.target.result);
  const reader = new FileReader();
  reader.onload = ev => loadCSV(ev.target.result);
  reader.readAsText(f, 'utf-8');
});
document.getElementById('search').addEventListener('input', render);
document.getElementById('filterPlat').addEventListener('change', render);
document.getElementById('filterContact').addEventListener('change', render);
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f || !f.name.endsWith('.csv')) return;
  const reader = new FileReader();
  reader.onload = ev => loadCSV(ev.target.result);
  reader.readAsText(f, 'utf-8');
});
